<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndianWin</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle at top, #2a0000, #0b0b0b 70%);
  color:#fff;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:12px;
}

/* BADGE */
.badge{
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  text-align:center;
  padding:10px;
  font-weight:800;
  border-radius:40px;
  margin:10px 0;
  font-size:13px;
}

/* LOGO */
.banner img{
  width:65%;
  max-width:230px;
  margin:12px auto;
  display:block;
  border-radius:12px;
  border:2px solid rgba(255,0,0,0.4);
}

/* TITLE */
h1{
  text-align:center;
  font-size:28px;
  margin:10px 0;
  font-weight:900;
}

h1 span{
  color:#ff1a1a;
  display:block;
}

/* TEXT */
.sub{
  text-align:center;
  color:#ddd;
  margin-bottom:15px;
  font-size:14px;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  background:linear-gradient(180deg,#ff1a1a,#b30000);
  padding:15px;
  border-radius:14px;
  color:#fff;
  font-size:17px;
  font-weight:800;
  text-decoration:none;
  margin:12px 0;
}

/* SMALL TEXT */
.small{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

/* SECTION TITLE */
.section-title{
  text-align:center;
  font-size:18px;
  font-weight:800;
  margin:15px 0 10px;
}

/* PROOF CLEAN SINGLE LINE */
.proof{
  display:flex;
  flex-wrap:nowrap;
  gap:10px;
  overflow-x:auto;
  padding-bottom:5px;
}

.proof img{
  width:48%;
  flex:0 0 auto;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  object-fit:cover;
}

/* MOBILE */
@media(max-width:480px){
  h1{ font-size:26px; }
  .btn{ font-size:16px; }
}
</style>

</head>

<body>

<div class="container">

  <!-- BADGE -->
  <div class="badge">★ INDIA'S #1 GAMING PLATFORM ★</div>

  <!-- LOGO -->
  <div class="banner">
    <img src="https://i.ibb.co/JRPNQfFk/IMG-20260514-212432-496.png" alt="logo">
  </div>

  <!-- TITLE -->
  <h1>WELCOME TO <span>INDIANWIN</span></h1>

  <p class="sub">Join 25,000+ players winning big every day 🏆</p>

  <!-- BUTTON 1 -->
  <a class="btn" href="https://indianwingame.online/#/register?invitationCode=848887739646" target="_blank">
    REGISTER NOW →
  </a>

  <p class="small">🔒 Safe • Instant Access • 24/7 Support</p>

  <!-- PROOF -->
  <div class="section-title">🛡 REAL WITHDRAWAL PROOF</div>

  <div class="proof">
    <img src="https://i.ibb.co/BKQVx0Ht/Screenshot-2026-05-12-15-32-02-34-40deb401b9ffe8e1df2f1cc5ba480b12-jpg.jpg" alt="">
    <img src="https://i.ibb.co/5XqzXMwX/Screenshot-2026-05-10-22-23-46-34-40deb401b9ffe8e1df2f1cc5ba480b12-jpg.jpg" alt="">
  </div>

  <!-- BUTTON 2 -->
  <a class="btn" href="https://indianwingame.online/#/register?invitationCode=848887739646" target="_blank">
    CLAIM YOUR BONUS →
  </a>

</div>

</body>
</html>
