<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAYA VIP 3D</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CONTAINER */
.container {
  width: 100%;
  padding: 15px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 350px;
  margin: auto;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  text-align: center;
}

/* CIRCLE IMAGE WITH WHITE GLOW */
.profile-pic {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  margin: auto;
  overflow: hidden;
  box-shadow: 0 0 25px white, 0 0 50px #38bdf8;
  border: 3px solid white;
}

.profile-pic img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TITLE */
.card h2 {
  margin: 15px 0;
  font-size: 22px;
  font-weight: bold;
  color: #0c4a6e;
}

/* TEXT */
.card p {
  font-weight: bold;
  font-size: 15px;
}

/* BUTTONS */
.btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border: none;
  border-radius: 15px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

/* BTN COLORS */
.btn1 {
  background: linear-gradient(45deg, #0284c7, #0369a1);
  color: white;
}

.btn2 {
  background: linear-gradient(45deg, #0ea5e9, #38bdf8);
  color: black;
}

/* CLICK EFFECT */
.btn:active {
  transform: scale(0.95);
}
</style>

</head>
<body>

<div class="container">
  <div class="card">

    <!-- CIRCLE PHOTO -->
    <div class="profile-pic">
      <img src="https://i.ibb.co/DgPJ407F/photo.jpg" alt="photo">
    </div>

    <!-- NAME -->
    <h2>ANAYA VIP 👑</h2>

    <!-- TEXT -->
    <p>💰 JOIN TELEGRAM 💰</p>

    <!-- BUTTONS WITH LINK -->
    <button class="btn btn1" onclick="window.location.href='https://t.me/+bTishliCb7M4NWFl'">
      JOIN TELEGRAM
    </button>

    <button class="btn btn2" onclick="window.location.href='https://t.me/+bTishliCb7M4NWFl'">
      SUBSCRIBE NOW
    </button>

  </div>
</div>

</body>
</html>
